version: '3.8'

services:
  app:
    build: .
    container_name: wildwatch-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - MONGO_URI=${MONGO_URI}
      - PORT=3000
    depends_on:
      - mongo
    restart: unless-stopped
    volumes:
      - ./src:/app/src

  mongo:
    image: mongo:7-alpine
    container_name: wildwatch-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: wildwatch
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  default:
    name: wildwatch-network
