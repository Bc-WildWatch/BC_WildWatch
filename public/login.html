<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Secure Auth</title>
  <link rel="stylesheet" href="login.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page">
    <aside class="brand-panel" aria-hidden="true">
      <div class="brand-content">
        <div class="brand-logo" aria-hidden="true">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="48" height="48" rx="12" fill="currentColor" fill-opacity="0.15"/>
            <path d="M24 14c-4.4 0-8 3.1-8 7v2h16v-2c0-3.9-3.6-7-8-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <rect x="14" y="23" width="20" height="14" rx="3" stroke="currentColor" stroke-width="2"/>
            <circle cx="24" cy="30" r="2" fill="currentColor"/>
          </svg>
        </div>
        <h1>Secure access</h1>
        <p>Passwords are hashed before storage. Accounts stay on this device only.</p>
      </div>
    </aside>

    <main class="auth-panel">
     
      <section id="auth-section" class="card">
        <header class="card-header">
          <h2 id="form-title">Welcome back</h2>
          <p id="form-subtitle">Sign in to your account</p>
        </header>

        <div class="tabs" role="tablist" aria-label="Authentication mode">
          <button type="button" class="tab active" id="tab-login" role="tab" aria-selected="true" aria-controls="login-form">Log in</button>
          <button type="button" class="tab" id="tab-signup" role="tab" aria-selected="false" aria-controls="signup-form">Create account</button>
        </div>

        <div id="message" class="message" role="alert" hidden></div>

        <form id="login-form" class="form active" novalidate>
          <div class="field">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" name="email" autocomplete="email" required placeholder="you@example.com">
          </div>
          <div class="field">
            <label for="login-password">Password</label>
            <div class="password-wrap">
              <input type="password" id="login-password" name="password" autocomplete="current-password" required placeholder="Your password" minlength="8">
              <button type="button" class="toggle-password" data-target="login-password" aria-label="Show password">Show</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Sign in</button>
        </form>

        <form id="signup-form" class="form" novalidate hidden>
          <div class="field">
            <label for="signup-name">Full name</label>
            <input type="text" id="signup-name" name="name" autocomplete="name" required placeholder="Jane Doe" minlength="2" maxlength="80">
          </div>
          <div class="field">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" name="email" autocomplete="email" required placeholder="you@example.com">
          </div>
          <div class="field">
            <label for="signup-password">Password</label>
            <div class="password-wrap">
              <input type="password" id="signup-password" name="password" autocomplete="new-password" required placeholder="At least 8 characters" minlength="8">
              <button type="button" class="toggle-password" data-target="signup-password" aria-label="Show password">Show</button>
            </div>
            <p class="hint">Must be at least 8 characters.</p>
          </div>
          <div class="field">
            <label for="signup-confirm">Confirm password</label>
            <div class="password-wrap">
              <input type="password" id="signup-confirm" name="confirm" autocomplete="new-password" required placeholder="Repeat password" minlength="8">
              <button type="button" class="toggle-password" data-target="signup-confirm" aria-label="Show password">Show</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Create account</button>
        </form>
      </section>
    </main>
  </div>

  <script src="login.js"></script>
</body>
</html>
